<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPOCH Mini Project 5th Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">EPOCH MINI PROJECT 5TH</p>
        <h1>Public Leaderboard</h1>
        <p class="subtitle">
          제출 결과를 기반으로 계산된 공개 리더보드입니다. 팀별 최고 점수만 반영되며, 점수는 자동 갱신된 JSON 파일을 기준으로 표시됩니다.
        </p>
      </div>
      <div class="hero-meta">
        <div class="meta-card">
          <span class="meta-label">Metric</span>
          <strong id="metricName">PR-AUC</strong>
        </div>
        <div class="meta-card">
          <span class="meta-label">Last Updated</span>
          <strong id="updatedAt">-</strong>
        </div>
      </div>
    </header>

    <main>
      <section class="card summary-card">
        <div class="summary-item">
          <span class="summary-label">등록 팀 수</span>
          <strong id="teamCount">0</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">최고 점수</span>
          <strong id="bestScore">-</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">표시 기준</span>
          <strong>팀별 최고 점수</strong>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Leaderboard</h2>
          <button id="refreshButton" type="button">새로고침</button>
        </div>

        <div id="statusMessage" class="status-message">리더보드를 불러오는 중입니다...</div>

        <div class="table-wrap" id="tableWrap" hidden>
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>Team</th>
                <th>Score</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>

        <p class="footer-note">
          본 화면은 <code>leaderboard_public.json</code> 파일을 읽어 렌더링합니다.
        </p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
